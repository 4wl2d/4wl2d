<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Vladislav Tomilov, 4wl2d, Senior Mobile Engineer</title>
  <desc id="desc">A concise deep-blue profile banner with a rotated blue Poké Ball and the nickname 4wl2d curved across it.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050A13"/>
      <stop offset="0.58" stop-color="#0A1628"/>
      <stop offset="1" stop-color="#0D2342"/>
    </linearGradient>
    <linearGradient id="ballBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58A6FF"/>
      <stop offset="0.55" stop-color="#1F6FEB"/>
      <stop offset="1" stop-color="#0969DA"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#58A6FF" stroke-opacity="0.045"/>
    </pattern>
    <clipPath id="ballClip">
      <circle r="138"/>
    </clipPath>
    <filter id="ballShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#010409" flood-opacity="0.58"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#background)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="418" rx="27" fill="none" stroke="#58A6FF" stroke-opacity="0.24"/>

  <path d="M720 420L1200 58V420Z" fill="#1F6FEB" opacity="0.055"/>
  <path d="M842 420L1200 154V420Z" fill="#58A6FF" opacity="0.035"/>
  <line x1="723" y1="66" x2="723" y2="354" stroke="#58A6FF" stroke-opacity="0.14"/>

  <g font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="72" y="72" width="4" height="238" rx="2" fill="#1F6FEB"/>
    <text x="100" y="94" fill="#58A6FF" font-size="17" font-weight="650" letter-spacing="4.6">@4wl2d</text>

    <text x="98" y="174" fill="#F0F6FC" font-size="51" font-weight="730" letter-spacing="-1.2">Vladislav Tomilov</text>

    <text x="100" y="230" fill="#C9D1D9" font-size="23" font-weight="600">Senior Mobile Engineer</text>
    <text x="100" y="276" fill="#8C959F" font-size="16" font-weight="560" letter-spacing="1.2">ANDROID  ·  KOTLIN MULTIPLATFORM  ·  ARCHITECTURE</text>

    <line x1="100" y1="314" x2="596" y2="314" stroke="url(#accentLine)"/>
    <text x="100" y="354" fill="#8C959F" font-size="14" font-weight="560" letter-spacing="2.2">BELGRADE, SERBIA  ·  6+ YEARS</text>
  </g>

  <g transform="translate(963 210) rotate(-17)" filter="url(#ballShadow)">
    <circle r="142" fill="#010409" opacity="0.62"/>

    <g clip-path="url(#ballClip)">
      <rect x="-138" y="-138" width="276" height="138" fill="url(#ballBlue)"/>
      <rect x="-138" y="0" width="276" height="138" fill="#071A34"/>
      <path d="M-138 52L138-38V138H-138Z" fill="#0B2B55" opacity="0.52"/>
      <rect x="-142" y="-14" width="284" height="28" fill="#F0F6FC"/>
      <rect x="-142" y="-3" width="284" height="6" fill="#8C959F" opacity="0.55"/>
      <ellipse cx="-48" cy="-96" rx="62" ry="18" fill="#F0F6FC" opacity="0.11" transform="rotate(-12)"/>
    </g>

    <circle r="138" fill="none" stroke="#58A6FF" stroke-width="3"/>
    <circle r="143" fill="none" stroke="#30363D" stroke-width="2"/>

    <path id="nicknameArc" d="M-104 58A120 120 0 0 0 104 58" fill="none"/>
    <text fill="#F0F6FC" font-family="Inter, ui-sans-serif, sans-serif" font-size="25" font-weight="760" letter-spacing="7">
      <textPath href="#nicknameArc" startOffset="50%" text-anchor="middle">4wl2d</textPath>
    </text>

    <circle r="43" fill="#0D1117" stroke="#F0F6FC" stroke-width="8"/>
    <circle r="24" fill="#1F6FEB" stroke="#58A6FF" stroke-width="3"/>
    <circle r="8" fill="#F0F6FC" opacity="0.92"/>
  </g>
</svg>
