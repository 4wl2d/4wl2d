<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Vladislav Tomilov, 4wl2d, Lead Software Engineer</title>
  <desc id="desc">A concise deep-blue profile banner with a rotated geometric personal mark whose axes extend across the card.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050A13"/>
      <stop offset="0.58" stop-color="#0A1628"/>
      <stop offset="1" stop-color="#0D2342"/>
    </linearGradient>
    <linearGradient id="logoStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58A6FF"/>
      <stop offset="0.62" stop-color="#2F81F7"/>
      <stop offset="1" stop-color="#1F6FEB"/>
    </linearGradient>
    <linearGradient id="logoAxisH" gradientUnits="userSpaceOnUse" x1="-1100" y1="0" x2="300" y2="0">
      <stop offset="0" stop-color="#1F6FEB" stop-opacity="0.07"/>
      <stop offset="0.52" stop-color="#1F6FEB" stop-opacity="0.13"/>
      <stop offset="0.71" stop-color="#58A6FF" stop-opacity="0.78"/>
      <stop offset="0.84" stop-color="#1F6FEB" stop-opacity="0.64"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="logoAxisV" gradientUnits="userSpaceOnUse" x1="0" y1="-520" x2="0" y2="520">
      <stop offset="0" stop-color="#1F6FEB" stop-opacity="0.12"/>
      <stop offset="0.32" stop-color="#58A6FF" stop-opacity="0.72"/>
      <stop offset="0.66" stop-color="#1F6FEB" stop-opacity="0.60"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#58A6FF" stroke-opacity="0.045"/>
    </pattern>
    <clipPath id="cardClip">
      <rect width="1200" height="420" rx="28"/>
    </clipPath>
    <filter id="logoShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="16" stdDeviation="15" flood-color="#010409" flood-opacity="0.58"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#background)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>

  <g clip-path="url(#cardClip)">
    <path d="M720 420L1200 58V420Z" fill="#1F6FEB" opacity="0.055"/>
    <path d="M842 420L1200 154V420Z" fill="#58A6FF" opacity="0.035"/>

    <g transform="translate(946 220) rotate(6.5)">
      <rect x="-136" y="-136" width="272" height="272" rx="4" fill="#071A34" fill-opacity="0.26" filter="url(#logoShadow)"/>
      <rect x="-136" y="-136" width="272" height="272" rx="4" fill="none" stroke="#1F6FEB" stroke-width="18" stroke-opacity="0.10"/>
      <rect x="-132" y="-132" width="264" height="264" rx="3" fill="none" stroke="url(#logoStroke)" stroke-width="7"/>

      <line x1="-1200" y1="0" x2="420" y2="0" stroke="url(#logoAxisH)" stroke-width="7"/>
      <line x1="0" y1="-620" x2="0" y2="620" stroke="url(#logoAxisV)" stroke-width="7"/>

    </g>
  </g>

  <g font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="100" y="94" fill="#58A6FF" font-size="20" font-weight="650" letter-spacing="4.6">@4wl2d</text>

    <text x="98" y="174" fill="#F0F6FC" font-size="56" font-weight="730" letter-spacing="-1.2">Vladislav Tomilov</text>

    <text x="100" y="230" fill="#C9D1D9" font-size="27" font-weight="600">Lead Software Engineer</text>

    <line x1="100" y1="314" x2="596" y2="314" stroke="url(#accentLine)"/>
    <text x="100" y="354" fill="#8C959F" font-size="14" font-weight="560" letter-spacing="2.2">BELGRADE, SERBIA</text>
  </g>

  <rect x="1" y="1" width="1198" height="418" rx="27" fill="none" stroke="#58A6FF" stroke-opacity="0.24"/>
</svg>
